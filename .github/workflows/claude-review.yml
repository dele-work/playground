# PR自動レビュー
# トリガー: PR作成時・更新時に自動実行
# Claude[bot]のPR、ドキュメントのみの変更は除外
name: Claude Auto Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/scripts/**"
      - "LICENSE"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: |
      github.event.pull_request.draft == false &&
      github.actor != 'claude[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            このPRをコードレビューしてください。
            .github/prompts/review.md のルールに従ってください。

            レビュー観点:
            1. セキュリティリスク（OWASP Top 10）
            2. ロジックの正確性
            3. テストカバレッジ
            4. アーキテクチャ適合性

            Critical/High の指摘がなければ approve してください。
            指摘は該当行にインラインコメントで残してください。
          claude_args: "--max-turns 10 --max-budget-usd 2.00 --model claude-sonnet-4-6 --permission-mode dontAsk"
          additional_permissions: |
            checks: read
