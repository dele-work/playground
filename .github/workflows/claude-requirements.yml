# 要件定義エージェント — Issue上で壁打ちして要件を詰める
# トリガー: Issue に `claude:requirements` ラベルを付与
name: Claude Requirements

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  requirements:
    if: |
      (github.event_name == 'issues' &&
       github.event.label.name == 'claude:requirements') ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.issue.labels.*.name, 'claude:requirements') &&
       !contains(github.event.comment.user.login, '[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: claude-requirements-${{ github.event.issue.number }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            要件定義エージェントとして動作してください。
            .github/prompts/requirements.md のルールに従ってください。

            Issue #${{ github.event.issue.number }} の要求を分析し、
            不明点があればIssueにコメントで質問してください。

            人間から「要件確定」というコメントが来たら:
            1. 最終的な要件定義書をIssueコメントに投稿
            2. `claude:requirements` ラベルを削除
            3. `claude:implement` ラベルを付与（実装エージェントを起動）
          claude_args: "--max-turns 15 --max-budget-usd 3.00 --model claude-sonnet-4-6 --permission-mode dontAsk"
