# パイプライン停滞監視 — 30分間隔で停滞を検知し自動回復を試行
name: Pipeline Stuck Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check for stuck pipelines
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          NOW=$(date +%s)
          STUCK_THRESHOLD=1800  # 30分

          # claude:implement ラベル付きで30分以上更新がないIssue
          gh issue list --repo "$REPO" --label "claude:implement" --state open --json number,updatedAt \
            --jq '.[] | "\(.number) \(.updatedAt)"' | while read -r ISSUE_NUM UPDATED; do

            UPDATED_TS=$(date -j -f "%Y-%m-%dT%H:%M:%SZ" "$UPDATED" +%s 2>/dev/null || \
                         date -d "$UPDATED" +%s 2>/dev/null || echo "0")
            DIFF=$((NOW - UPDATED_TS))

            if [ "$DIFF" -gt "$STUCK_THRESHOLD" ]; then
              echo "Issue #$ISSUE_NUM appears stuck (${DIFF}s since last update)"

              # human:review-needed がなければ自動回復を試行
              HAS_HUMAN=$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json labels \
                --jq '.labels[].name' | grep "human:review-needed" || true)

              if [ -z "$HAS_HUMAN" ]; then
                gh issue edit "$ISSUE_NUM" --remove-label "claude:implement" --repo "$REPO" || true
                sleep 3
                gh issue edit "$ISSUE_NUM" --add-label "claude:implement" --repo "$REPO"
                echo "Retried Issue #$ISSUE_NUM"
              fi
            fi
          done

          echo "Monitor check complete"
