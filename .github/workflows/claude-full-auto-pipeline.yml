# フルオートパイプライン — CI修正→レビュー→レビュー修正→マージを全自動
# トリガー: PRに `claude:full-auto` ラベルを付与
# `claude:full-auto(auto-merge)` なら最後に自動マージ、なしなら人間レビュー待ち
name: Claude Full Auto Pipeline

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  pipeline:
    if: |
      (github.event.action == 'labeled' && startsWith(github.event.label.name, 'claude:full-auto')) ||
      (github.event.action == 'synchronize' &&
       (contains(github.event.pull_request.labels.*.name, 'claude:full-auto') ||
        contains(github.event.pull_request.labels.*.name, 'claude:full-auto(auto-merge)')))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: claude-pipeline-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Determine pipeline mode
        id: mode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "claude:full-auto(auto-merge)"; then
            echo "auto_merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check CI status
        id: ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          FAILED=$(gh pr checks ${{ github.event.pull_request.number }} --repo "$REPO" --json state \
            --jq '[.[] | select(.state == "FAILURE")] | length' 2>/dev/null || echo "0")
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      # CI失敗なら修正
      - name: Fix CI failures
        if: steps.ci.outputs.failed != '0'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            PR #${{ github.event.pull_request.number }} のCIが失敗しています。
            .github/prompts/fix-ci.md に従って修正してください。
          claude_args: "--max-turns 10 --max-budget-usd 3.00 --model claude-sonnet-4-6 --permission-mode dontAsk"
          additional_permissions: |
            actions: read
            checks: read

      # CI通過ならレビュー＆修正
      - name: Review and fix
        if: steps.ci.outputs.failed == '0'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            PR #${{ github.event.pull_request.number }} をレビューし、
            Critical/High の指摘があれば自分で修正してください。
            .github/prompts/review.md に従ってください。
            修正したらコミットしてください。
            指摘がなければ approve してください。
          claude_args: "--max-turns 15 --max-budget-usd 3.00 --model claude-sonnet-4-6 --permission-mode dontAsk"

      # 自動マージ
      - name: Auto merge
        if: steps.ci.outputs.failed == '0' && steps.mode.outputs.auto_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          PENDING=$(gh pr checks "$PR_NUM" --repo "$REPO" --json state \
            --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length' 2>/dev/null || echo "1")

          if [ "$PENDING" = "0" ]; then
            gh pr merge "$PR_NUM" --repo "$REPO" --squash --delete-branch
          else
            gh pr comment "$PR_NUM" --repo "$REPO" \
              --body "Auto-merge skipped: CI checks not all passed."
            gh pr edit "$PR_NUM" --repo "$REPO" --add-label "human:review-needed"
          fi
