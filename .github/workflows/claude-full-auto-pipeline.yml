# フルオートパイプライン — CI修正→レビュー→レビュー修正→マージを全自動
# トリガー: PRに `claude:full-auto` ラベルを付与
# `claude:full-auto(auto-merge)` なら最後に自動マージ、なしなら人間レビュー待ち
name: Claude Full Auto Pipeline

on:
  pull_request:
    types: [labeled]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  pipeline:
    if: |
      (github.event_name == 'pull_request' &&
       startsWith(github.event.label.name, 'claude:full-auto')) ||
      (github.event_name == 'check_suite')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: claude-pipeline-${{ github.event.pull_request.number || github.event.check_suite.head_sha }}
      cancel-in-progress: false

    steps:
      - name: Determine PR and state
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
          else
            PR_NUM=$(gh api "repos/$REPO/commits/${{ github.event.check_suite.head_sha }}/pulls" \
              --jq '.[0].number' 2>/dev/null || echo "")
          fi

          if [ -z "$PR_NUM" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # full-auto ラベルがあるか確認
          LABELS=$(gh pr view "$PR_NUM" --repo "$REPO" --json labels --jq '.labels[].name')
          HAS_FULL_AUTO=$(echo "$LABELS" | grep "claude:full-auto" || true)

          if [ -z "$HAS_FULL_AUTO" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # auto-merge 付きか判定
          if echo "$LABELS" | grep -q "claude:full-auto(auto-merge)"; then
            echo "auto_merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.state.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Check CI status and run pipeline
        if: steps.state.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ steps.state.outputs.pr_num }}
        run: |
          # CI結果を確認
          FAILED=$(gh pr checks "$PR_NUM" --repo "$REPO" --json state \
            --jq '[.[] | select(.state == "FAILURE")] | length' 2>/dev/null || echo "0")

          if [ "$FAILED" != "0" ]; then
            echo "ci_failed=true" >> "$GITHUB_ENV"
          else
            echo "ci_failed=false" >> "$GITHUB_ENV"
          fi

      # Step 1: CI失敗なら修正
      - name: Fix CI failures
        if: steps.state.outputs.skip != 'true' && env.ci_failed == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            PR #${{ steps.state.outputs.pr_num }} のCIが失敗しています。
            .github/prompts/fix-ci.md に従って修正してください。
          claude_args: "--max-turns 10 --max-budget-usd 3.00 --model claude-sonnet-4-6"

      # Step 2: レビュー実行
      - name: Auto review
        if: steps.state.outputs.skip != 'true' && env.ci_failed != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            PR #${{ steps.state.outputs.pr_num }} をレビューしてください。
            .github/prompts/review.md に従ってください。

            Critical/High の指摘がある場合:
            1. 指摘内容をPRコメントに投稿
            2. 可能なら自動修正してコミット

            指摘がない場合:
            1. approve
          claude_args: "--max-turns 15 --max-budget-usd 3.00 --model claude-sonnet-4-6"

      # Step 3: 自動マージ（オプション）
      - name: Auto merge if enabled
        if: |
          steps.state.outputs.skip != 'true' &&
          steps.state.outputs.auto_merge == 'true' &&
          env.ci_failed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ steps.state.outputs.pr_num }}
        run: |
          # 全チェック通過を再確認
          PENDING=$(gh pr checks "$PR_NUM" --repo "$REPO" --json state \
            --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length' 2>/dev/null || echo "1")

          if [ "$PENDING" = "0" ]; then
            gh pr merge "$PR_NUM" --repo "$REPO" --squash --delete-branch
          else
            echo "CI checks not all passed, skipping auto-merge"
            gh pr comment "$PR_NUM" --repo "$REPO" \
              --body "Auto-merge skipped: CI checks not all passed. Please review manually."
          fi
